<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizQuest</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .menu-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .menu-screen.hidden { display: none; }
        .menu-container { text-align: center; background: rgba(255, 255, 255, 0.95); padding: 50px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); max-width: 500px; }
        .game-title { font-size: 48px; color: #667eea; margin-bottom: 10px; }
        .game-subtitle { font-size: 18px; color: #666; margin-bottom: 40px; }
        .menu-buttons { display: flex; flex-direction: column; gap: 15px; }
        .menu-button { padding: 15px 30px; font-size: 18px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .menu-button:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4); }
        .game-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; }
        .game-screen.hidden { display: none; }
        #gameCanvas { display: block; background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%); }
        .hud { position: fixed; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: center; color: white; font-size: 16px; z-index: 100; background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 10px; }
        .hud-left { display: flex; gap: 30px; }
        .hud-item { display: flex; gap: 10px; align-items: center; }
        .hud-label { font-weight: bold; color: #ffdd57; }
        .progress-bar { width: 200px; height: 20px; background: rgba(255, 255, 255, 0.2); border-radius: 10px; overflow: hidden; border: 2px solid white; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00d4ff, #0099ff); transition: width 0.3s ease; }
        .quiz-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); display: flex; justify-content: center; align-items: center; z-index: 500; }
        .quiz-overlay.hidden { display: none; }
        .quiz-panel { background: white; border-radius: 15px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); }
        .quiz-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 15px 15px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .close-btn { background: rgba(255, 255, 255, 0.2); border: none; color: white; font-size: 24px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; }
        .quiz-content { padding: 30px; }
        .question-text { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 25px; line-height: 1.6; }
        .answer-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .answer-option { padding: 15px; background: #f5f5f5; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .answer-option:hover { background: #e8e8ff; border-color: #667eea; }
        .answer-option.selected { background: #667eea; color: white; }
        .submit-button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .feedback-message { margin-top: 15px; padding: 12px; border-radius: 8px; font-weight: bold; text-align: center; }
        .feedback-message.hidden { display: none; }
        .feedback-message.correct { background: #c8e6c9; color: #2e7d32; }
        .feedback-message.incorrect { background: #ffcdd2; color: #c62828; }
        .pause-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); display: flex; justify-content: center; align-items: center; z-index: 600; }
        .pause-menu.hidden { display: none; }
        .pause-panel { background: white; padding: 40px; border-radius: 15px; text-align: center; }
        #fileInput { display: none; }
        input[type="text"] { width: 100%; padding: 10px; font-size: 16px; border-radius: 8px; border: 2px solid #ddd; }
    </style>
</head>
<body>
    <div id="mainMenu" class="menu-screen">
        <div class="menu-container">
            <h1 class="game-title">🎮 QuizQuest</h1>
            <p class="game-subtitle">Interactive Learning Adventure</p>
            <div class="menu-buttons">
                <button id="uploadBtn" class="menu-button">📁 Upload Flashcards</button>
            </div>
            <div style="font-size: 14px; color: #999; margin-top: 20px;">
                <p>⬆️⬇️⬅️➡️ or WASD to move</p>
                <p>Press SPACE in a zone to answer</p>
                <p>Press ESC to pause</p>
            </div>
            <input type="file" id="fileInput" accept=".csv,.json">
        </div>
    </div>

    <div id="gameScreen" class="game-screen hidden">
        <canvas id="gameCanvas" width="1200" height="700"></canvas>
        <div id="hud" class="hud">
            <div class="hud-left">
                <div class="hud-item"><span class="hud-label">Score:</span><span id="scoreDisplay">0</span></div>
                <div class="hud-item"><span class="hud-label">Zone:</span><span id="zoneDisplay">Exploring</span></div>
            </div>
            <div class="hud-right">
                <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                <span id="progressText">0/0</span>
            </div>
        </div>
        <div id="pauseMenu" class="pause-menu hidden">
            <div class="pause-panel">
                <h2>⏸️ PAUSED</h2>
                <button id="resumeBtn" class="menu-button">Resume</button>
                <button id="mainMenuBtn" class="menu-button">Main Menu</button>
            </div>
        </div>
    </div>

    <div id="quizOverlay" class="quiz-overlay hidden">
        <div class="quiz-panel">
            <div class="quiz-header">
                <h2 id="quizZoneName">Quiz</h2>
                <button id="closeQuizBtn" class="close-btn">✕</button>
            </div>
            <div class="quiz-content">
                <div id="questionText" class="question-text"></div>
                <div id="answerContainer" class="answer-container"></div>
                <button id="submitAnswerBtn" class="submit-button">Submit</button>
                <div id="feedbackMessage" class="feedback-message hidden"></div>
            </div>
        </div>
    </div>

    <script>
        const gameState = { player: { x: 100, y: 100, width: 40, height: 40 }, camera: { x: 0, y: 0, width: 1200, height: 700 }, zones: [], quizzes: [], score: 0, completedQuestions: new Set(), currentZone: null, isPaused: false, gameStarted: false, keys: {} };
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const mainMenuEl = document.getElementById('mainMenu');
        const gameScreenEl = document.getElementById('gameScreen');

        uploadBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    let quizData = [];
                    if (file.name.endsWith('.csv')) {
                        quizData = parseCSV(event.target.result);
                    }
                    gameState.zones = [];
                    gameState.quizzes = [];
                    gameState.completedQuestions.clear();
                    gameState.score = 0;
                    processQuizData(quizData);
                    startGame();
                } catch (e) {
                    alert('Error: ' + e.message);
                }
            };
            reader.readAsText(file);
        });

        function parseCSV(content) {
            const lines = content.split('\n').filter(l => l.trim());
            const quizData = [];
            for (let line of lines) {
                const parts = line.split('\t').length > 1 ? line.split('\t') : line.split(',');
                if (parts.length >= 2) {
                    const question = parts[0].trim();
                    const answer = parts[1].trim();
                    if (question && answer) {
                        quizData.push({ zone: 'Quiz', question, type: 'text', options: [], answer });
                    }
                }
            }
            return quizData;
        }

        function processQuizData(quizData) {
            const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8'];
            let idx = 0;
            const zone = { name: 'Quiz Zone', x: 150, y: 150, width: 350, height: 350, color: colors[idx], icon: '📚', completed: false };
            gameState.zones.push(zone);
            gameState.quizzes = quizData;
            idx++;
        }

        function startGame() {
            gameState.gameStarted = true;
            mainMenuEl.classList.add('hidden');
            gameScreenEl.classList.remove('hidden');
            gameLoop();
        }

        window.addEventListener('keydown', (e) => {
            gameState.keys[e.key.toLowerCase()] = true;
            if (e.key === 'Escape') togglePause();
            if (e.code === 'Space' && gameState.currentZone && !gameState.isPaused) {
                e.preventDefault();
                if (document.getElementById('quizOverlay').classList.contains('hidden')) showQuiz();
            }
        });

        window.addEventListener('keyup', (e) => gameState.keys[e.key.toLowerCase()] = false);

        function togglePause() {
            if (!gameState.gameStarted) return;
            gameState.isPaused = !gameState.isPaused;
            document.getElementById('pauseMenu').classList.toggle('hidden');
        }

        document.getElementById('resumeBtn').addEventListener('click', () => {
            gameState.isPaused = false;
            document.getElementById('pauseMenu').classList.add('hidden');
        });

        document.getElementById('mainMenuBtn').addEventListener('click', () => {
            gameState.gameStarted = false;
            gameScreenEl.classList.add('hidden');
            mainMenuEl.classList.remove('hidden');
        });

        function updatePlayer() {
            gameState.player.velocityX = 0;
            gameState.player.velocityY = 0;
            if (gameState.keys['arrowup'] || gameState.keys['w']) gameState.player.velocityY = -2.5;
            if (gameState.keys['arrowdown'] || gameState.keys['s']) gameState.player.velocityY = 2.5;
            if (gameState.keys['arrowleft'] || gameState.keys['a']) gameState.player.velocityX = -2.5;
            if (gameState.keys['arrowright'] || gameState.keys['d']) gameState.player.velocityX = 2.5;

            gameState.player.x += gameState.player.velocityX;
            gameState.player.y += gameState.player.velocityY;

            if (gameState.player.x < 0) gameState.player.x = 0;
            if (gameState.player.x > 2000) gameState.player.x = 2000;
            if (gameState.player.y < 0) gameState.player.y = 0;
            if (gameState.player.y > 2000) gameState.player.y = 2000;

            gameState.camera.x = gameState.player.x - 600;
            gameState.camera.y = gameState.player.y - 350;

            gameState.currentZone = null;
            for (let zone of gameState.zones) {
                if (gameState.player.x < zone.x + zone.width && gameState.player.x + gameState.player.width > zone.x &&
                    gameState.player.y < zone.y + zone.height && gameState.player.y + gameState.player.height > zone.y) {
                    gameState.currentZone = zone;
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#90EE90';
            for (let i = 0; i < canvas.width; i += 40) {
                for (let j = 0; j < canvas.height; j += 40) {
                    if ((i / 40 + j / 40) % 2 === 0) ctx.fillRect(i, j, 40, 40);
                }
            }

            for (let zone of gameState.zones) {
                const sx = zone.x - gameState.camera.x;
                const sy = zone.y - gameState.camera.y;
                ctx.fillStyle = zone.color;
                ctx.fillRect(sx, sy, zone.width, zone.height);
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 3;
                ctx.strokeRect(sx, sy, zone.width, zone.height);
                
                ctx.font = 'bold 50px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(zone.icon, sx + zone.width / 2, sy + zone.height / 2 - 30);
                
                ctx.fillStyle = '#333';
                ctx.font = 'bold 20px Arial';
                ctx.fillText(zone.name, sx + zone.width / 2, sy + zone.height / 2 + 60);
            }

            const sx = gameState.player.x - gameState.camera.x;
            const sy = gameState.player.y - gameState.camera.y;
            ctx.fillStyle = '#FF6B6B';
            ctx.fillRect(sx + 10, sy + 10, 20, 15);
            ctx.fillStyle = '#FFD93D';
            ctx.beginPath();
            ctx.arc(sx + 20, sy + 8, 8, 0, Math.PI * 2);
            ctx.fill();

            if (gameState.currentZone) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(10, canvas.height - 60, 400, 50);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                ctx.fillText('Press SPACE to take quiz', 20, canvas.height - 35);
            }
        }

        function updateHUD() {
            document.getElementById('scoreDisplay').textContent = gameState.score;
            document.getElementById('zoneDisplay').textContent = gameState.currentZone ? gameState.currentZone.name : 'Exploring';
            const total = gameState.quizzes.length;
            const done = gameState.completedQuestions.size;
            document.getElementById('progressText').textContent = `${done}/${total}`;
            document.getElementById('progressFill').style.width = total > 0 ? (done / total * 100) + '%' : '0%';
        }

        let currentQuestion = null;
        let selectedAnswer = null;

        function showQuiz() {
            const unasked = gameState.quizzes.find(q => !gameState.completedQuestions.has(q.question));
            if (!unasked) {
                alert('All questions completed!');
                return;
            }
            currentQuestion = unasked;
            selectedAnswer = null;
            document.getElementById('questionText').textContent = currentQuestion.question;
            document.getElementById('feedbackMessage').classList.add('hidden');
            const answerContainer = document.getElementById('answerContainer');
            answerContainer.innerHTML = '';
            
            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = 'Type your answer...';
            input.oninput = (e) => { selectedAnswer = e.target.value; };
            answerContainer.appendChild(input);
            
            document.getElementById('quizOverlay').classList.remove('hidden');
        }

        document.getElementById('submitAnswerBtn').addEventListener('click', () => {
            if (!selectedAnswer) { alert('Please answer'); return; }
            const correct = selectedAnswer.toLowerCase().trim() === currentQuestion.answer.toLowerCase().trim();
            const feedback = document.getElementById('feedbackMessage');
            if (correct) {
                gameState.score += 10;
                gameState.completedQuestions.add(currentQuestion.question);
                feedback.textContent = '✅ Correct!';
                feedback.classList.add('correct');
                feedback.classList.remove('incorrect');
            } else {
                feedback.textContent = `❌ Wrong. Answer: ${currentQuestion.answer}`;
                feedback.classList.add('incorrect');
                feedback.classList.remove('correct');
            }
            feedback.classList.remove('hidden');
            document.getElementById('submitAnswerBtn').disabled = true;
            setTimeout(() => {
                document.getElementById('quizOverlay').classList.add('hidden');
                document.getElementById('submitAnswerBtn').disabled = false;
                updateHUD();
            }, 2000);
        });

        document.getElementById('closeQuizBtn').addEventListener('click', () => {
            document.getElementById('quizOverlay').classList.add('hidden');
        });

        function gameLoop() {
            if (!gameState.isPaused) {
                updatePlayer();
                updateHUD();
                draw();
            }
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
